<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0010"/>
      <stop offset="50%" stop-color="#1a0535"/>
      <stop offset="100%" stop-color="#2d0a5c"/>
    </linearGradient>
    <linearGradient id="neon-pink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2d9b"/>
      <stop offset="100%" stop-color="#ff6fd8"/>
    </linearGradient>
    <linearGradient id="neon-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b5ea7"/>
    </linearGradient>
    <linearGradient id="neon-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b24fff"/>
      <stop offset="100%" stop-color="#6a1fa0"/>
    </linearGradient>
    <linearGradient id="bldg-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0624"/>
      <stop offset="100%" stop-color="#050010"/>
    </linearGradient>
    <linearGradient id="bldg-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#180838"/>
      <stop offset="100%" stop-color="#0a0220"/>
    </linearGradient>
    <filter id="glow-pink" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-bg">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="480" fill="url(#sky)"/>

  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="50" cy="30" r="1" fill="white" opacity="0.9"/>
    <circle cx="120" cy="15" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="200" cy="45" r="1" fill="white" opacity="0.8"/>
    <circle cx="310" cy="20" r="1" fill="white" opacity="0.6"/>
    <circle cx="450" cy="10" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="560" cy="35" r="1" fill="white" opacity="0.7"/>
    <circle cx="670" cy="12" r="1" fill="#b8f" opacity="0.8"/>
    <circle cx="750" cy="28" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="870" cy="18" r="1" fill="white" opacity="0.9"/>
    <circle cx="950" cy="40" r="1" fill="#8df" opacity="0.7"/>
    <circle cx="1050" cy="22" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="1150" cy="8" r="1" fill="white" opacity="0.9"/>
    <circle cx="85" cy="65" r="1" fill="#f8f" opacity="0.6"/>
    <circle cx="380" cy="55" r="1" fill="white" opacity="0.8"/>
    <circle cx="620" cy="60" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="820" cy="50" r="1" fill="#aef" opacity="0.9"/>
    <circle cx="1100" cy="60" r="1" fill="white" opacity="0.6"/>
  </g>

  <!-- Moon -->
  <circle cx="1080" cy="70" r="42" fill="#fdf3c0" opacity="0.15"/>
  <circle cx="1080" cy="70" r="38" fill="#fdf9e8" opacity="0.12"/>

  <!-- Far background buildings (very dark, tiny windows) -->
