  <rect x="340" y="145" width="110" height="335" fill="url(#bldg-mid)" rx="3"/>
  <g fill="#1a2a5a" opacity="0.9">
    <rect x="350" y="160" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="368" y="160" width="12" height="16" rx="1"/>
    <rect x="386" y="160" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="404" y="160" width="12" height="16" rx="1"/>
    <rect x="422" y="160" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="350" y="188" width="12" height="16" rx="1"/>
    <rect x="368" y="188" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="386" y="188" width="12" height="16" rx="1"/>
    <rect x="404" y="188" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="422" y="188" width="12" height="16" rx="1"/>
    <rect x="350" y="216" width="12" height="16" rx="1" fill="#4466ff" opacity="0.9"/>
    <rect x="368" y="216" width="12" height="16" rx="1"/>
    <rect x="386" y="216" width="12" height="16" rx="1" fill="#4466ff" opacity="0.9"/>
    <rect x="404" y="216" width="12" height="16" rx="1" fill="#ffaa00" opacity="0.9"/>
    <rect x="422" y="216" width="12" height="16" rx="1"/>
