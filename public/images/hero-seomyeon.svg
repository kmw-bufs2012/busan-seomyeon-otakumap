    <rect x="55" y="230" width="40" height="230" fill="url(#bldg-dark)" rx="2"/>
    <rect x="90" y="185" width="55" height="275" fill="url(#bldg-dark)" rx="2"/>
    <rect x="140" y="220" width="35" height="240" fill="url(#bldg-dark)" rx="2"/>
    <rect x="170" y="195" width="70" height="265" fill="url(#bldg-dark)" rx="2"/>
    <rect x="240" y="210" width="45" height="250" fill="url(#bldg-dark)" rx="2"/>
    <rect x="280" y="180" width="60" height="280" fill="url(#bldg-dark)" rx="2"/>
    <!-- tiny window lights -->
    <g fill="#ffcc44" opacity="0.6">
      <rect x="10" y="215" width="3" height="4" rx="0.5"/>
      <rect x="18" y="225" width="3" height="4" rx="0.5"/>
      <rect x="10" y="240" width="3" height="4" rx="0.5"/>
      <rect x="100" y="200" width="3" height="4" rx="0.5"/>
      <rect x="110" y="220" width="3" height="4" rx="0.5"/>
      <rect x="185" y="210" width="3" height="4" rx="0.5"/>
      <rect x="200" y="230" width="3" height="4" rx="0.5"/>
      <rect x="293" y="196" width="3" height="4" rx="0.5"/>
      <rect x="305" y="215" width="3" height="4" rx="0.5"/>
    </g>
  </g>

  <!-- Mid buildings right side -->
  <g opacity="0.5">
    <rect x="860" y="190" width="65" height="270" fill="url(#bldg-dark)" rx="2"/>
    <rect x="920" y="210" width="50" height="250" fill="url(#bldg-dark)" rx="2"/>
    <rect x="965" y="185" width="80" height="275" fill="url(#bldg-dark)" rx="2"/>
    <rect x="1040" y="220" width="55" height="240" fill="url(#bldg-dark)" rx="2"/>
    <rect x="1090" y="200" width="70" height="260" fill="url(#bldg-dark)" rx="2"/>
    <rect x="1155" y="215" width="50" height="245" fill="url(#bldg-dark)" rx="2"/>
    <g fill="#ffcc44" opacity="0.6">
