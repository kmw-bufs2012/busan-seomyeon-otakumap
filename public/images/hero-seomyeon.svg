  <!-- Samjung Tower (center) - tallest -->
  <rect x="490" y="60" width="130" height="420" fill="#120828" rx="4"/>
  <rect x="494" y="64" width="122" height="412" fill="#160a30" rx="3"/>
  <!-- Samjung windows grid -->
  <g fill="#1e3a8a" opacity="0.8">
    <rect x="500" y="75" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="520" y="75" width="14" height="18" rx="1"/>
    <rect x="540" y="75" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="560" y="75" width="14" height="18" rx="1"/>
    <rect x="580" y="75" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="600" y="75" width="14" height="18" rx="1"/>
    <rect x="500" y="102" width="14" height="18" rx="1"/>
    <rect x="520" y="102" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="540" y="102" width="14" height="18" rx="1" fill="#4488ff" opacity="0.9"/>
    <rect x="560" y="102" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="580" y="102" width="14" height="18" rx="1"/>
    <rect x="600" y="102" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="500" y="129" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="520" y="129" width="14" height="18" rx="1"/>
    <rect x="540" y="129" width="14" height="18" rx="1"/>
    <rect x="560" y="129" width="14" height="18" rx="1" fill="#ff4488" opacity="0.9"/>
    <rect x="580" y="129" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="600" y="129" width="14" height="18" rx="1"/>
    <rect x="500" y="156" width="14" height="18" rx="1"/>
    <rect x="520" y="156" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="540" y="156" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="560" y="156" width="14" height="18" rx="1"/>
    <rect x="580" y="156" width="14" height="18" rx="1" fill="#4488ff" opacity="0.9"/>
    <rect x="600" y="156" width="14" height="18" rx="1" fill="#ffcc00" opacity="0.9"/>
  </g>
  <!-- Samjung banner: CGV + Animate -->
  <rect x="494" y="290" width="122" height="50" rx="2" fill="#0a1f6e" opacity="0.9"/>
  <text x="555" y="313" text-anchor="middle" font-size="11" font-weight="bold" font-family="sans-serif" fill="#4488ff" filter="url(#glow-blue)">CGV</text>
  <text x="555" y="330" text-anchor="middle" font-size="9" font-weight="bold" font-family="sans-serif" fill="#00ccff" filter="url(#glow-blue)">animate</text>
  <!-- Samjung roof antenna -->
  <rect x="552" y="50" width="6" height="15" fill="#335" rx="1"/>
  <circle cx="555" cy="48" r="3" fill="#ff2d9b" opacity="0.9" filter="url(#glow-pink)"/>

  <!-- Right side building -->
  <rect x="780" y="135" width="100" height="345" fill="url(#bldg-mid)" rx="3"/>
  <g fill="#1a2a5a" opacity="0.9">
    <rect x="790" y="150" width="12" height="15" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="808" y="150" width="12" height="15" rx="1"/>
    <rect x="826" y="150" width="12" height="15" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="844" y="150" width="12" height="15" rx="1"/>
    <rect x="862" y="150" width="12" height="15" rx="1" fill="#ff4444" opacity="0.9"/>
    <rect x="790" y="175" width="12" height="15" rx="1"/>
    <rect x="808" y="175" width="12" height="15" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="826" y="175" width="12" height="15" rx="1" fill="#4488ff" opacity="0.9"/>
    <rect x="844" y="175" width="12" height="15" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="862" y="175" width="12" height="15" rx="1"/>
  </g>
  <!-- Neon sign right -->
  <rect x="785" y="265" width="90" height="28" rx="4" fill="#0044ff" opacity="0.2" filter="url(#glow-soft)"/>
  <text x="830" y="284" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#00ccff" filter="url(#glow-blue)">서브컬처</text>

  <!-- Far right building -->
  <rect x="1100" y="160" width="100" height="320" fill="url(#bldg-mid)" rx="3"/>
  <g fill="#1a2a5a" opacity="0.9">
    <rect x="1110" y="175" width="11" height="14" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="1127" y="175" width="11" height="14" rx="1"/>
    <rect x="1144" y="175" width="11" height="14" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="1161" y="175" width="11" height="14" rx="1" fill="#4488ff" opacity="0.9"/>
    <rect x="1178" y="175" width="11" height="14" rx="1"/>
    <rect x="1110" y="200" width="11" height="14" rx="1"/>
    <rect x="1127" y="200" width="11" height="14" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="1144" y="200" width="11" height="14" rx="1"/>
    <rect x="1161" y="200" width="11" height="14" rx="1" fill="#ffcc00" opacity="0.9"/>
    <rect x="1178" y="200" width="11" height="14" rx="1" fill="#ff4488" opacity="0.9"/>
  </g>

  <!-- Neon hanging signs left street -->
  <rect x="95" y="310" width="90" height="22" rx="4" fill="none" stroke="#ff2d9b" stroke-width="1.5" opacity="0.7" filter="url(#glow-pink)"/>
  <text x="140" y="325" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#ff6fd8" filter="url(#glow-pink)">ANIME SHOP</text>

  <rect x="95" y="345" width="90" height="22" rx="4" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0.7" filter="url(#glow-blue)"/>
  <text x="140" y="360" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#7fffff" filter="url(#glow-blue)">フィギュア</text>

  <!-- Street level glow -->
  <rect x="0" y="440" width="1200" height="40" fill="url(#neon-pink)" opacity="0.07"/>
  <rect x="0" y="445" width="1200" height="35" fill="url(#neon-blue)" opacity="0.05"/>

  <!-- Ground/pavement -->
  <rect x="0" y="460" width="1200" height="20" fill="#07021a"/>

  <!-- Neon road reflections -->
  <ellipse cx="300" cy="470" rx="200" ry="8" fill="#ff2d9b" opacity="0.08" filter="url(#glow-soft)"/>
  <ellipse cx="800" cy="468" rx="250" ry="6" fill="#00ccff" opacity="0.06" filter="url(#glow-soft)"/>
  <ellipse cx="555" cy="472" rx="120" ry="5" fill="#b24fff" opacity="0.08" filter="url(#glow-soft)"/>

  <!-- Sakura petals floating (anime-style) -->
  <g opacity="0.85" filter="url(#glow-pink)">
    <!-- Petal shape using paths -->
    <ellipse cx="80" cy="220" rx="6" ry="3" fill="#ffb8d9" transform="rotate(-30 80 220)"/>
    <ellipse cx="160" cy="180" rx="5" ry="2.5" fill="#ffc8e0" transform="rotate(20 160 180)"/>
    <ellipse cx="240" cy="260" rx="7" ry="3.5" fill="#ffaad0" transform="rotate(-15 240 260)"/>
    <ellipse cx="420" cy="195" rx="5" ry="2.5" fill="#ffb8d9" transform="rotate(40 420 195)"/>
    <ellipse cx="700" cy="170" rx="6" ry="3" fill="#ffc0e0" transform="rotate(-25 700 170)"/>
    <ellipse cx="830" cy="200" rx="5" ry="2.5" fill="#ffb0d5" transform="rotate(15 830 200)"/>
    <ellipse cx="960" cy="155" rx="7" ry="3.5" fill="#ffcce8" transform="rotate(-35 960 155)"/>
    <ellipse cx="1070" cy="200" rx="5" ry="2.5" fill="#ffb8d9" transform="rotate(50 1070 200)"/>
    <ellipse cx="1170" cy="165" rx="6" ry="3" fill="#ffd0ec" transform="rotate(-20 1170 165)"/>
    <!-- Second layer -->
    <ellipse cx="120" cy="300" rx="4" ry="2" fill="#ffb8d9" transform="rotate(35 120 300)" opacity="0.7"/>
    <ellipse cx="330" cy="140" rx="5" ry="2.5" fill="#ffaad0" transform="rotate(-10 330 140)" opacity="0.8"/>
    <ellipse cx="640" cy="240" rx="6" ry="3" fill="#ffc8e0" transform="rotate(25 640 240)" opacity="0.7"/>
    <ellipse cx="1000" cy="270" rx="4" ry="2" fill="#ffb8d9" transform="rotate(-45 1000 270)" opacity="0.7"/>
  </g>

  <!-- Anime-style sparkles / stars -->
  <g fill="#ffffa0" filter="url(#glow-pink)" opacity="0.9">
    <!-- 4-pointed star shape at various positions -->
    <polygon points="180,95 182,103 190,105 182,107 180,115 178,107 170,105 178,103" transform="scale(0.7) translate(-47,-42)"/>
    <polygon points="720,80 723,91 734,94 723,97 720,108 717,97 706,94 717,91"/>
    <polygon points="1020,100 1022,108 1030,110 1022,112 1020,120 1018,112 1010,110 1018,108" transform="scale(0.8) translate(-203,-10)"/>
  </g>
  <g fill="#c0e0ff" filter="url(#glow-blue)" opacity="0.9">
