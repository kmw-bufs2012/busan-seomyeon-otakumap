    <polygon points="900,85 902,93 910,95 902,97 900,105 898,97 890,95 898,93" transform="scale(0.75) translate(-77,-19)"/>
  </g>

  <!-- Main neon text glow bars on buildings -->
  <!-- Large 서면 sign center building -->
  <rect x="493" y="340" width="124" height="38" rx="5" fill="#6600cc" opacity="0.15" filter="url(#glow-soft)"/>
  <text x="555" y="363" text-anchor="middle" font-size="16" font-weight="900" font-family="sans-serif" fill="url(#neon-purple)" filter="url(#glow-pink)">서면 서브컬처</text>

  <!-- Anime character silhouette hints -->
  <!-- Simple stylized anime girl silhouette left side, semi-transparent -->
  <g opacity="0.12" fill="#b06fff">
    <!-- head -->
    <circle cx="200" cy="380" r="25"/>
    <!-- hair -->
    <ellipse cx="200" cy="368" rx="30" ry="20"/>
    <rect x="174" y="368" width="8" height="50" rx="4"/>
    <rect x="218" y="368" width="8" height="45" rx="4"/>
    <!-- body -->
    <rect x="185" y="402" width="30" height="55" rx="5"/>
    <!-- dress -->
    <polygon points="180,455 220,455 235,480 165,480"/>
    <!-- arms -->
    <rect x="160" y="405" width="25" height="8" rx="4" transform="rotate(-15 160 405)"/>
    <rect x="215" y="405" width="25" height="8" rx="4" transform="rotate(15 215 405)"/>
  </g>

  <!-- Similar right side character -->
  <g opacity="0.1" fill="#ff70b0">
    <circle cx="1000" cy="375" r="22"/>
    <ellipse cx="1000" cy="363" rx="28" ry="18"/>
    <rect x="976" y="363" width="7" height="48" rx="3.5"/>
    <rect x="1017" y="363" width="7" height="42" rx="3.5"/>
    <rect x="986" y="395" width="28" height="52" rx="5"/>
    <polygon points="980,445 1020,445 1032,475 968,475"/>
    <rect x="962" y="398" width="24" height="7" rx="3.5" transform="rotate(-12 962 398)"/>
    <rect x="1014" y="398" width="24" height="7" rx="3.5" transform="rotate(12 1014 398)"/>
  </g>

  <!-- Overall atmosphere gradient overlay top-bottom -->
  <rect width="1200" height="480" fill="url(#sky)" opacity="0.15"/>
  <!-- Purple-pink mist at bottom -->
  <rect x="0" y="400" width="1200" height="80" fill="#2d0060" opacity="0.3"/>

  <!-- Horizontal neon glow line (street level) -->
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#6622ff" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#ff22aa" stroke-width="0.5" opacity="0.2"/>
</svg>
