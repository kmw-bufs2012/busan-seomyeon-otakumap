  <!-- Left tall building -->
  <rect x="0" y="120" width="90" height="360" fill="url(#bldg-mid)" rx="3"/>
  <g fill="#1a3a7a" opacity="0.8">
    <rect x="8" y="135" width="10" height="14" rx="1"/>
    <rect x="24" y="135" width="10" height="14" rx="1"/>
    <rect x="40" y="135" width="10" height="14" rx="1"/>
    <rect x="56" y="135" width="10" height="14" rx="1"/>
    <rect x="72" y="135" width="10" height="14" rx="1"/>
    <rect x="8" y="160" width="10" height="14" rx="1"/>
    <rect x="24" y="160" width="10" height="14" rx="1"/>
    <rect x="40" y="160" width="10" height="14" fill="#ffaa00" rx="1" opacity="0.9"/>
    <rect x="56" y="160" width="10" height="14" rx="1"/>
    <rect x="72" y="160" width="10" height="14" fill="#ffaa00" rx="1" opacity="0.9"/>
    <rect x="8" y="185" width="10" height="14" fill="#ffaa00" rx="1" opacity="0.9"/>
    <rect x="24" y="185" width="10" height="14" rx="1"/>
    <rect x="40" y="185" width="10" height="14" rx="1"/>
    <rect x="56" y="185" width="10" height="14" fill="#ffaa00" rx="1" opacity="0.9"/>
    <rect x="72" y="185" width="10" height="14" rx="1"/>
  </g>
  <!-- Neon sign on left building -->
  <rect x="5" y="260" width="80" height="32" rx="4" fill="#ff0066" opacity="0.2" filter="url(#glow-soft)"/>
  <text x="45" y="281" text-anchor="middle" font-size="13" font-weight="bold" font-family="sans-serif" fill="#ff2d9b" filter="url(#glow-pink)">서면</text>

