      <rect x="890" y="230" width="3" height="4" rx="0.5"/>
      <rect x="980" y="200" width="3" height="4" rx="0.5"/>
      <rect x="995" y="225" width="3" height="4" rx="0.5"/>
      <rect x="1055" y="235" width="3" height="4" rx="0.5"/>
      <rect x="1105" y="215" width="3" height="4" rx="0.5"/>
    </g>
